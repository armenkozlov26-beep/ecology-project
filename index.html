<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-TRASH | Эко-система будущего</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --accent: #00c853; 
            --dark: #1a1c1a; 
            --glass: rgba(255, 255, 255, 0.85);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Manrope', sans-serif; background: #f0f4f0; color: var(--dark); overflow-x: hidden; }

        /* Навигация с эффектом размытия */
        nav { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(15px);
            padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: fixed; width: 100%; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; color: var(--dark); font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        nav .links a { text-decoration: none; color: var(--dark); margin-left: 25px; font-size: 13px; font-weight: 600; transition: 0.3s; opacity: 0.7; }
        nav .links a:hover { opacity: 1; color: var(--accent); }

        /* Главный экран */
        header { 
            height: 90vh; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; color: white; padding: 0 20px;
        }
        header h1 { font-size: clamp(32px, 5vw, 64px); line-height: 1.1; margin-bottom: 20px; font-weight: 800; }
        header p { font-size: 18px; max-width: 600px; opacity: 0.9; }

        /* Секция с формой */
        .section-form { 
            padding: 100px 5%; 
            background: #f0f4f0;
            position: relative;
        }
        .form-glass { 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 30px; 
            max-width: 500px; 
            margin: -150px auto 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative; z-index: 10;
            text-align: center;
        }
        
        .form-glass h2 { font-weight: 800; font-size: 26px; margin-bottom: 10px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #666; }
        input, select { 
            width: 100%; padding: 14px; border: 2px solid #eef0ee; border-radius: 12px; 
            font-family: inherit; font-weight: 600; transition: 0.3s; background: white;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-main { 
            background: var(--dark); color: white; border: none; padding: 18px; 
            border-radius: 12px; cursor: pointer; font-weight: 800; width: 100%; 
            font-size: 16px; transition: 0.4s;
        }
        .btn-main:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 200, 83, 0.2); }

        /* Карта */
        #map { height: 500px; width: 100%; border-radius: 20px; filter: grayscale(0.1); margin: 40px 0; }

        /* Футер */
        footer { background: var(--dark); color: white; padding: 60px 8% 30px; }
        .status-msg { font-weight: 700; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">G-<span>TRASH</span></div>
        <div class="links">
            <a href="#request">ОСТАВИТЬ ЗАЯВКУ</a>
            <a href="#map">КАРТА ТОЧЕК</a>
        </div>
    </nav>

    <header>
        <h1>Сделаем мир <br>чище вместе</h1>
        <p>Удобный сервис по вывозу и переработке отходов в вашем городе.</p>
    </header>

    <section id="request" class="section-form">
        <div class="form-glass">
            <h2>Оставить заявку</h2>
            <p style="margin-bottom: 25px; opacity: 0.7;">Менеджер свяжется с вами для уточнения деталей</p>
            
            <div class="input-group">
                <label>Ваше Имя</label>
                <input type="text" id="name" placeholder="Введите имя">
            </div>

            <div class="input-group">
                <label>Что сдаем?</label>
                <select id="waste-type">
                    <option value="plastic">Пластик</option>
                    <option value="paper">Макулатура</option>
                    <option value="glass">Стекло</option>
                    <option value="metal">Металл</option>
                </select>
            </div>

            <div class="input-group">
                <label>Примерный вес (кг)</label>
                <input type="number" id="weight" placeholder="Например: 10">
            </div>

            <button class="btn-main" onclick="sendData()">ОТПРАВИТЬ ДАННЫЕ</button>
            <div id="status" class="status-msg"></div>
        </div>

        <div id="map"></div>
    </section>

    <footer>
        <div style="text-align: center; opacity: 0.5; font-size: 12px;">
            &copy; 2026 G-TRASH Digital. Проект Эко-Портал.
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Инициализация карты
        var map = L.map('map').setView([55.75, 37.61], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([55.75, 37.61]).addTo(map).bindPopup("Москва: Пункт приема активен");

        // Функция отправки
        async function sendData() {
            const name = document.getElementById('name').value;
            const weight = document.getElementById('weight').value;
            const type = document.getElementById('waste-type').value;
            const statusDiv = document.getElementById('status');

            if (!name || !weight) {
                statusDiv.style.display = "block";
                statusDiv.innerText = "❌ Заполните все поля";
                statusDiv.style.color = "#ff5252";
                return;
            }

            statusDiv.style.display = "block";
            statusDiv.innerText = "⏳ Отправка в базу...";
            statusDiv.style.color = "#ffa000";

            try {
                const response = await fetch('https://ecology-project-do42.onrender.com/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        client_name: name, 
                        weight: parseFloat(weight),
                        waste_type: type 
                    })
                });

                if (response.ok) {
                    statusDiv.innerText = "✅ Успешно отправлено в Supabase!";
                    statusDiv.style.color = "#00c853";
                    document.getElementById('name').value = "";
                    document.getElementById('weight').value = "";
                } else {
                    statusDiv.innerText = "❌ Ошибка сервера (HTTPS)";
                    statusDiv.style.color = "#ff5252";
                }
            } catch (e) {
                statusDiv.innerText = "❌ Ошибка сети. Проверьте Render.";
                statusDiv.style.color = "#ff5252";
            }
        }
    </script>
</body>
</html>
