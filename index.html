<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-TRASH | DIGITAL ECO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --deep: #1b2d1d; --lime: #c9e265; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--white); margin: 0; color: var(--deep); }
        
        /* HEADER */
        nav { background: var(--deep); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; color: var(--white); }
        .logo { font-weight: 900; color: var(--lime); text-decoration: none; font-size: 24px; }
        
        /* HERO */
        .hero { background: var(--deep); color: var(--white); padding: 100px 10%; text-align: center; }
        .hero h1 { font-size: 80px; margin: 0; color: var(--lime); }
        
        /* STATS */
        .stats { display: flex; justify-content: space-around; padding: 50px; background: #000; color: var(--lime); font-weight: 900; }

        /* BLOG */
        .blog { background: var(--deep); padding: 100px 10%; color: var(--white); }
        .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 20px; text-align: center; }
        .card img { width: 100%; border-radius: 20px; }

        /* FORM */
        .form-wrap { padding: 100px 10%; display: flex; justify-content: center; background: #f4f4f4; }
        .form-box { background: #fff; padding: 50px; border-radius: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .input-field { margin-bottom: 25px; }
        .input-field label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .input-field input, .input-field select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 20px; background: #00ca4e; color: #fff; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <nav><a href="#" class="logo">G-TRASH</a></nav>
    <div class="hero"><h1>ECO SYSTEM</h1><p>Будущее без мусора начинается здесь</p></div>
    
    <div class="stats">
        <div>1284<br><small>Тонн переработано</small></div>
        <div>5402<br><small>Выездов</small></div>
        <div>15k<br><small>Клиентов</small></div>
    </div>

    <div class="blog">
        <h2 style="text-align: center;">Блог</h2>
        <div class="blog-grid">
            <div class="card"><img src="https://via.placeholder.com/300x200/444/fff?text=ECO+1"><h3>Рециклинг</h3></div>
            <div class="card"><img src="https://via.placeholder.com/300x200/444/fff?text=ECO+2"><h3>Технологии</h3></div>
            <div class="card"><img src="https://via.placeholder.com/300x200/444/fff?text=ECO+3"><h3>Zero Waste</h3></div>
        </div>
    </div>

    <div class="form-wrap" id="request">
        <div class="form-box">
            <h2>Онлайн-заявка</h2>
            <div class="input-field">
                <label>Ваше имя</label>
                <input type="text" id="client_name" placeholder="Константин">
            </div>
            <div class="input-field">
                <label>Категория отходов</label>
                <select id="waste_type_id">
                    <option value="1">Бумага и Картон</option>
                    <option value="2">Пластик</option>
                    <option value="3">Металл</option>
                </select>
            </div>
            <div class="input-field">
                <label>Объем сырья (кг)</label>
                <input type="number" id="weight_kg" placeholder="Например: 50">
            </div>
            <button class="btn" onclick="sendToRender()">ВЫЗВАТЬ КУРЬЕРА</button>
        </div>
    </div>

    <script>
        async function sendToRender() {
            const name = document.getElementById('client_name').value;
            const weight = document.getElementById('weight_kg').value;
            const wasteId = document.getElementById('waste_type_id').value;

            const payload = {
                client_name: String(name),
                weight_kg: parseFloat(weight),
                waste_type_id: parseInt(wasteId)
            };

            console.log("Отправка:", payload); // Проверь в консоли F12!

            try {
                const response = await fetch('https://ecology-project-do42.onrender.com/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Заявка принята! Проверь pgAdmin.");
                } else {
                    const err = await response.json();
                    console.error("422 Details:", err);
                    alert("Ошибка 422. Проверь поля.");
                }
            } catch (e) {
                alert("Ошибка соединения с сервером");
            }
        }
    </script>
</body>
</html>
