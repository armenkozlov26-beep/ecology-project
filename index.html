<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экологический сбор</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #e8f5e9; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        h2 { color: #2e7d32; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Сбор пластика ♻️</h2>
    <input type="text" id="name" placeholder="Ваше имя">
    <input type="number" id="weight" placeholder="Вес (кг)">
    <button onclick="sendData()">Отправить данные</button>
    <div id="status"></div>
</div>

<script>
    async function sendData() {
        const name = document.getElementById('name').value;
        const weight = document.getElementById('weight').value;
        const statusDiv = document.getElementById('status');

        if (!name || !weight) {
            statusDiv.innerText = "❌ Заполните все поля";
            statusDiv.style.color = "red";
            return;
        }

        statusDiv.innerText = "⏳ Отправка...";
        statusDiv.style.color = "orange";

        try {
            // ТВОЯ РАБОЧАЯ ССЫЛКА ОТ RENDER
            const response = await fetch('https://ecology-project-do42.onrender.com/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ client_name: name, weight: parseFloat(weight) })
            });

            const result = await response.json();

            if (result.status === "success") {
                statusDiv.innerText = "✅ Заявка сохранена в облаке!";
                statusDiv.style.color = "green";
                document.getElementById('name').value = "";
                document.getElementById('weight').value = "";
            } else {
                statusDiv.innerText = "❌ Ошибка: " + result.details;
                statusDiv.style.color = "red";
            }
        } catch (error) {
            statusDiv.innerText = "❌ Сервер не отвечает";
            statusDiv.style.color = "red";
        }
    }
</script>

</body>
</html>
